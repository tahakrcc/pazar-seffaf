# Profil: dev — yerel PostgreSQL yoksa docker-compose ile postgres acin veya asagidaki H2'yi kullanin.
spring:
  datasource:
    url: jdbc:h2:mem:pazar;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

app:
  minio:
    enabled: false
